<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Horizon Scanning</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --orange: #f0883e;
      --purple: #bc8cff;
      --pink: #ff7b72;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    header span {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .stat-card .number {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-card .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }

    .filters span {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d1117;
      font-weight: 600;
    }

    /* Articles grid */
    .articles {
      display: grid;
      gap: 12px;
    }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: start;
      transition: border-color 0.15s;
    }

    .article-card:hover {
      border-color: var(--accent);
    }

    .score-badge {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .score-high { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .score-mid  { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }

    .article-content { min-width: 0; }

    .article-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .article-title a {
      color: var(--text);
      text-decoration: none;
    }

    .article-title a:hover { color: var(--accent); }

    .article-raison {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .article-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .cat-tag {
      border-radius: 5px;
      padding: 2px 9px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .cat-IDE         { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
    .cat-AgentCLI    { background: rgba(188, 140, 255, 0.15); color: var(--purple); }
    .cat-LLM         { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .cat-Outil       { background: rgba(240, 136, 62, 0.15); color: var(--orange); }
    .cat-Autre       { background: rgba(139, 148, 158, 0.15); color: var(--text-muted); }

    .article-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }

    /* Last updated */
    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .meta-bar a {
      color: var(--accent);
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 32px;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>AI Horizon Scanning</h1>
  <span>Veille Technologique — IA pour la programmation</span>
  <div class="badge">n8n + Claude Haiku</div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="meta-bar">
    <span id="result-count"></span>
    <a href="https://github.com/TheoDscps/AIHorizonScanning" target="_blank">
      Voir le projet sur GitHub →
    </a>
  </div>

  <div class="filters" id="filters">
    <span>Filtrer :</span>
    <button class="filter-btn active" data-cat="all">Tous</button>
  </div>

  <div class="articles" id="articles">
    <div class="empty">Chargement...</div>
  </div>
</main>

<footer>
  Pipeline automatisé · <a href="https://github.com/TheoDscps/AIHorizonScanning" target="_blank">AIHorizonScanning</a> · Bachelier IT 2025-2026
</footer>

<script>
  const CATEGORIES = ['IDE', 'Agent CLI', 'LLM', 'Outil', 'Autre'];
  const CAT_CLASS = {
    'IDE': 'cat-IDE',
    'Agent CLI': 'cat-AgentCLI',
    'LLM': 'cat-LLM',
    'Outil': 'cat-Outil',
    'Autre': 'cat-Autre',
  };

  let allArticles = [];
  let activeFilter = 'all';

  function scoreClass(score) {
    return score >= 8 ? 'score-high' : 'score-mid';
  }

  function formatDate(dateStr) {
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch {
      return dateStr;
    }
  }

  function catKey(cat) {
    return (cat || 'Autre').trim();
  }

  function renderStats(articles) {
    const total = articles.length;
    const bycat = {};
    CATEGORIES.forEach(c => bycat[c] = 0);
    articles.forEach(a => {
      const c = catKey(a.categorie);
      if (bycat[c] !== undefined) bycat[c]++;
      else bycat['Autre']++;
    });

    const statsEl = document.getElementById('stats');
    const avgScore = total > 0
      ? (articles.reduce((s, a) => s + (a.score || 0), 0) / total).toFixed(1)
      : '—';

    let html = `
      <div class="stat-card">
        <div class="number" style="color:var(--accent)">${total}</div>
        <div class="label">Articles collectés</div>
      </div>
      <div class="stat-card">
        <div class="number" style="color:var(--green)">${avgScore}</div>
        <div class="label">Score moyen</div>
      </div>
    `;
    CATEGORIES.forEach(c => {
      if (bycat[c] > 0) {
        const colors = { 'IDE': 'var(--accent)', 'Agent CLI': 'var(--purple)', 'LLM': 'var(--green)', 'Outil': 'var(--orange)', 'Autre': 'var(--text-muted)' };
        html += `
          <div class="stat-card">
            <div class="number" style="color:${colors[c] || 'var(--text)'}">${bycat[c]}</div>
            <div class="label">${c}</div>
          </div>
        `;
      }
    });
    statsEl.innerHTML = html;
  }

  function renderFilters(articles) {
    const presentCats = [...new Set(articles.map(a => catKey(a.categorie)))];
    const filtersEl = document.getElementById('filters');

    // Remove existing cat buttons (keep Tous)
    [...filtersEl.querySelectorAll('[data-cat]:not([data-cat="all"])')].forEach(b => b.remove());

    presentCats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      if (cat === activeFilter) btn.classList.add('active');
      filtersEl.appendChild(btn);
    });

    filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.cat;
        filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderArticles();
      });
    });
  }

  function renderArticles() {
    const filtered = activeFilter === 'all'
      ? allArticles
      : allArticles.filter(a => catKey(a.categorie) === activeFilter);

    const countEl = document.getElementById('result-count');
    countEl.textContent = `${filtered.length} article${filtered.length > 1 ? 's' : ''}${activeFilter !== 'all' ? ` · ${activeFilter}` : ''}`;

    const container = document.getElementById('articles');
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">Aucun article pour cette catégorie.</div>';
      return;
    }

    container.innerHTML = filtered.map(a => {
      const cat = catKey(a.categorie);
      const catClass = CAT_CLASS[cat] || 'cat-Autre';
      return `
        <div class="article-card">
          <div class="score-badge ${scoreClass(a.score)}">${a.score}</div>
          <div class="article-content">
            <div class="article-title">
              <a href="${a.lien}" target="_blank" rel="noopener">${a.titre}</a>
            </div>
            <div class="article-raison">${a.raison}</div>
            <div class="article-meta">
              <span class="cat-tag ${catClass}">${cat}</span>
              <span class="article-date">${formatDate(a.date)}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function loadData() {
    try {
      const res = await fetch('./data/veille.json');
      if (!res.ok) throw new Error('Fichier non trouvé');
      const data = await res.json();
      allArticles = data.sort((a, b) => (b.score || 0) - (a.score || 0));
      renderStats(allArticles);
      renderFilters(allArticles);
      renderArticles();
    } catch (err) {
      document.getElementById('articles').innerHTML =
        `<div class="empty">Impossible de charger les données.<br><small>${err.message}</small></div>`;
    }
  }

  loadData();
</script>
</body>
</html>
